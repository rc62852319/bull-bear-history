<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bull / Bear History</title>

<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffe6f2;
        margin: 0;
        padding: 0;
        text-align: center;
    }
    h1 {
        margin-top: 20px;
        color: #cc0066;
    }
    #controls {
        margin: 20px;
    }
    label {
        font-size: 16px;
        margin-right: 8px;
        color: #333;
    }
    #dateSelector {
        padding: 8px 12px;
        font-size: 16px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }
    #chart {
        width: 95%;
        height: 650px;
        margin: 20px auto;
        background: white;
        border-radius: 10px;
        padding: 10px;
    }
</style>
</head>

<body>
<h1>Bull / Bear History</h1>

<div id="controls">
    <label for="dateSelector">Select date:</label>
    <select id="dateSelector">
        <option value="">Loading...</option>
    </select>
</div>

<div id="chart"></div>

<script>
async function loadJSON(url) {
    const res = await fetch(url);
    return res.json();
}

// Get list of JSON files from your GitHub repo (data/cbbc folder)
async function loadAllFiles() {
    const apiUrl = "https://api.github.com/repos/rc62852319/bull-bear-history/contents/data/cbbc";
    const list = await loadJSON(apiUrl);

    const files = list
        .filter(f => f.name.endsWith(".json"))
        .map(f => f.name)
        .sort()
        .reverse(); // latest first

    return files;
}

function extractData(json) {
    const price = [];
    const bull = [];
    const bear = [];

    json.mainData.forEach(row => {
        if (!row.fr || !row.to) return;

        const label = `${row.fr} - ${row.to}`;
        const value = Number(row.d1) || 0;

        if (row.ty === "bull") {
            price.push(label);
            bull.push(value);
            bear.push(0);
        } else if (row.ty === "bear") {
            price.push(label);
            bull.push(0);
            bear.push(value);
        }
    });

    return { price, bull, bear };
}

function computeHeavyZones(values) {
    const sorted = [...values].sort((a, b) => b - a);
    const threshold = sorted[Math.floor(values.length * 0.1)] || 0;
    return threshold;
}

function drawChart(price, bull, bear, date, json) {
    const chart = echarts.init(document.getElementById("chart"));

    const lastPrice = Number(json.furtherData.hsilast);

    const bullHeavy = computeHeavyZones(bull);
    const bearHeavy = computeHeavyZones(bear);

    const heavyZones = price.map((label, i) => {
        if (bull[i] >= bullHeavy) return "bull";
        if (bear[i] >= bearHeavy) return "bear";
        return "";
    });

    const sumBull = json.furtherData.sumBull.map(Number);
    const sumBear = json.furtherData.sumBear.map(Number);

    const option = {
        title: {
            text: `Bull / Bear Distribution — ${date}`,
            left: "center"
        },
        tooltip: {
            trigger: "axis",
            formatter: function (params) {
                const i = params[0].dataIndex;
                const label = price[i];
                const b = bull[i];
                const r = bear[i];
                const total = b + r;
                const heavy = heavyZones[i] ? `Heavy Zone (${heavyZones[i]})` : "";
                const last = label.includes(lastPrice.toFixed(0)) ? "← Last Price" : "";

                return `
<b>${label}</b> ${last}<br>
Bull: ${b}<br>
Bear: ${r}<br>
Total: ${total}<br>
${heavy}
                `;
            }
        },
        legend: {
            data: ["Bull", "Bear", "Bull Trend", "Bear Trend"],
            top: 30
        },
        xAxis: {
            type: "category",
            data: price
        },
        yAxis: [
            { type: "value", name: "Volume" },
            { type: "value", name: "Trend", position: "right" }
        ],
        series: [
            {
                name: "Bull",
                type: "bar",
                data: bull,
                itemStyle: { color: "#ff66b3" }
            },
            {
                name: "Bear",
                type: "bar",
                data: bear,
                itemStyle: { color: "#6666ff" }
            },
            {
                name: "Bull Trend",
                type: "line",
                yAxisIndex: 1,
                smooth: true,
                data: sumBull,
                itemStyle: { color: "#cc0066" }
            },
            {
                name: "Bear Trend",
                type: "line",
                yAxisIndex: 1,
                smooth: true,
                data: sumBear,
                itemStyle: { color: "#0033cc" }
            },
            {
                type: "markLine",
                name: "Last Price",
                symbol: "none",
                lineStyle: { color: "red", width: 2, type: "solid" },
                data: [
                    {
                        xAxis: price.findIndex(p => p.includes(lastPrice.toFixed(0))),
                        label: { formatter: `Last Price: ${lastPrice}` }
                    }
                ]
            }
        ]
    };

    chart.setOption(option);
}

async function init() {
    const selector = document.getElementById("dateSelector");
    selector.innerHTML = "<option value=''>Loading...</option>";

    const files = await loadAllFiles();

    selector.innerHTML = "";
    files.forEach(f => {
        const date = f.replace(".json", "");
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = date;
        selector.appendChild(opt);
    });

    async function loadSelected() {
        const file = selector.value;
        if (!file) return;
        const date = file.replace(".json", "");
        const json = await loadJSON(`data/cbbc/${file}`);
        const { price, bull, bear } = extractData(json);
        drawChart(price, bull, bear, date, json);
    }

    selector.addEventListener("change", loadSelected);

    // Default to the latest file (first in the sorted list)
    selector.value = files[0];
    loadSelected();
}

init();
</script>

</body>
</html>
