<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>牛熊歷史參考</title>

<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffe6f2;
        margin: 0;
        padding: 0;
        text-align: center;
    }
    h1 {
        margin-top: 20px;
        color: #cc0066;
    }
    #controls {
        margin: 20px;
        font-size: 16px;
    }
    #chart {
        width: 95%;
        height: 650px;
        margin: 20px auto;
        background: white;
        border-radius: 10px;
        padding: 10px;
    }
</style>
</head>

<body>

<h1>牛熊歷史參考</h1>

<div id="controls"></div>
<div id="chart"></div>

<script>
async function loadJSON(url) {
    const res = await fetch(url);
    return res.json();
}

async function loadAllFiles() {
    const apiUrl = "https://api.github.com/repos/rc62852319/bull-bear-history/contents/data/cbbc";
    const list = await loadJSON(apiUrl);

    return list
        .filter(f => f.name.endsWith(".json"))
        .map(f => f.name.replace(".json", ""))
        .sort()
        .reverse();
}

function splitDate(name) {
    const [y, m, d] = name.split("-");
    return { y, m, d };
}

// ❗ NO SORTING — keep original order
function extractData(json) {
    const price = [];
    const bull = [];
    const bear = [];

    json.mainData.forEach(row => {
        if (!row.fr || !row.to) return;

        const label = `${row.fr} - ${row.to}`;
        const value = Math.round(Number(row.d1) || 0);

        if (row.ty === "bull") {
            price.push(label);
            bull.push(value);
            bear.push(0);
        } else if (row.ty === "bear") {
            price.push(label);
            bull.push(0);
            bear.push(value);
        }
    });

    return { price, bull, bear };
}

function computeHeavyZones(values) {
    const sorted = [...values].sort((a, b) => b - a);
    return sorted[Math.floor(values.length * 0.1)] || 0;
}

function drawChart(price, bull, bear, date, json) {
    const chart = echarts.init(document.getElementById("chart"));

    const lastPrice = Math.round(Number(json.furtherData.hsilast));
    const bullHeavy = computeHeavyZones(bull);
    const bearHeavy = computeHeavyZones(bear);

    const heavyZones = price.map((label, i) => {
        if (bull[i] >= bullHeavy) return "bull";
        if (bear[i] >= bearHeavy) return "bear";
        return "";
    });

    chart.setOption({
        title: { text: date, left: "center" },

        tooltip: {
            trigger: "axis",
            axisPointer: { type: "shadow" },
            formatter: function (params) {
                const i = params[0].dataIndex;
                const label = price[i];
                const b = Math.round(bull[i]);
                const r = Math.round(bear[i]);
                const total = Math.round(b + r);
                const heavy = heavyZones[i] ? `Heavy Zone (${heavyZones[i]})` : "";
                const last = label.includes(lastPrice.toFixed(0)) ? "← Last Price" : "";

                return `
<b>${label}</b> ${last}<br>
Bull: ${b}<br>
Bear: ${r}<br>
Total: ${total}<br>
${heavy}
                `;
            }
        },

        legend: { data: ["Bear", "Bull"], top: 30 },

        yAxis: {
            type: "category",
            data: price,
            inverse: true
        },
        xAxis: {
            type: "value",
            name: "Volume"
        },

        series: [
            {
                name: "Bear",
                type: "bar",
                stack: "total",
                data: bear,
                itemStyle: { color: "#cc0000" },
                label: {
                    show: true,
                    position: "right",
                    formatter: p => p.value > 0 ? p.value : "",
                    color: "#cc0000",
                    fontWeight: "bold"
                }
            },
            {
                name: "Bull",
                type: "bar",
                stack: "total",
                data: bull,
                itemStyle: { color: "#006400" },
                label: {
                    show: true,
                    position: "right",
                    formatter: p => p.value > 0 ? p.value : "",
                    color: "#006400",
                    fontWeight: "bold"
                }
            }
        ]
    });
}

async function init() {
    const files = await loadAllFiles();

    const years = new Set();
    const months = {};
    const days = {};

    files.forEach(name => {
        const { y, m, d } = splitDate(name);

        years.add(y);

        if (!months[y]) months[y] = new Set();
        months[y].add(m);

        if (!days[y]) days[y] = {};
        if (!days[y][m]) days[y][m] = new Set();
        days[y][m].add(d);
    });

    const controls = document.getElementById("controls");
    controls.innerHTML = `
        <label>Year:</label>
        <select id="yearSel"></select>
        <label>Month:</label>
        <select id="monthSel"></select>
        <label>Date:</label>
        <select id="daySel"></select>
    `;

    const yearSel = document.getElementById("yearSel");
    const monthSel = document.getElementById("monthSel");
    const daySel = document.getElementById("daySel");

    [...years].sort().reverse().forEach(y => {
        yearSel.innerHTML += `<option value="${y}">${y}</option>`;
    });

    function updateMonths() {
        const y = yearSel.value;
        monthSel.innerHTML = "";
        [...months[y]].sort().forEach(m => {
            monthSel.innerHTML += `<option value="${m}">${m}</option>`;
        });
        updateDays();
    }

    function updateDays() {
        const y = yearSel.value;
        const m = monthSel.value;
        daySel.innerHTML = "";
        [...days[y][m]].sort().forEach(d => {
            daySel.innerHTML += `<option value="${d}">${d}</option>`;
        });
        loadSelected();
    }

    async function loadSelected() {
        const y = yearSel.value;
        const m = monthSel.value;
        const d = daySel.value;

        if (!y || !m || !d) return;

        const filename = `${y}-${m}-${d}.json`;
        const json = await loadJSON(`data/cbbc/${filename}`);
        const { price, bull, bear } = extractData(json);

        drawChart(price, bull, bear, `${y}-${m}-${d}`, json);
    }

    yearSel.addEventListener("change", updateMonths);
    monthSel.addEventListener("change", updateDays);
    daySel.addEventListener("change", loadSelected);

    updateMonths();
}
init();
</script>

</body>
</html>
