<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CBBC History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #0f172a;
      color: white;
    }
    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>
  <h1>HSI CBBC Outstanding History</h1>

  <canvas id="chart"></canvas>

  <script>
    async function load() {
      const res = await fetch('./data/history.json');
      const data = await res.json();

      const labels = data.map(x => x.date);
      const values = data.map(x => x.value);

      new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Outstanding',
            data: values,
            borderColor: 'blue'
          }]
        }
      });
    }

    load();
  </script>
</body>
</html>
