name: Daily CBBC Update

on:
  schedule:
    - cron: "0 22 * * *"   # runs every day 06:00 HK time (22:00 UTC)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: |
          python script.py

      - name: Generate files.json
        run: |
          echo "[" > data/files.json
          for f in data/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].json; do
            fname=$(basename "$f")
            echo "\"$fname\"," >> data/files.json
          done
          sed -i '$ s/,$//' data/files.json
          echo "]" >> data/files.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Daily data update" || echo "No changes to commit"
          git push
